app-id: com.xnview.XnConvert
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: xnconvert
tags:
  - proprietary
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Filesystem access
  - --filesystem=xdg-pictures
  - --persist=.config/xnconvert
  # OpenGL access
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/et
  - /share/examples
  - /share/doc
  - /share/man
modules:
  - name: ImageMagick
    config-opts:
      - --enable-shared
      - --disable-static
      - --disable-docs
      - --with-modules
      - --with-threads
      - --with-png
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://github.com/ImageMagick/ImageMagick/archive/7.1.2-26.tar.gz
        sha256: d63594e334e1c410f600fb9370d78d49e4dc6f315722ca4ba083e864e5c354cb
        x-checker-data:
          type: anitya
          project-id: 1372
          url-template: https://github.com/ImageMagick/ImageMagick/archive/$version.tar.gz

  - name: ghostscript
    config-opts:
      - --disable-cups
      - --disable-dbus
      - --disable-gtk
      - --with-system-libtiff
      - --with-drivers=FILES
    sources:
      - type: archive
        url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10071/ghostscript-10.07.1.tar.xz
        sha256: 1cdb766de8db8f1e589c817f09c5855ea5f65dfc8540e465a69ac14c18416025
        x-checker-data:
          type: anitya
          project-id: 1157
          url-template: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs${major}0$minor$patch/ghostscript-$version.tar.xz
      - type: shell
        commands:
          - rm -rf tesseract leptonica gpdl cups/libs jpeg libpng openjpeg tiff zlib

  - name: krb5
    subdir: src
    config-opts:
      - --localstatedir=/var/lib
      - --sbindir=${FLATPAK_DEST}/bin
      - --disable-static
      - --disable-rpath
    cleanup:
      - /bin
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.22/krb5-1.22.2.tar.gz
        sha256: 3243ffbc8ea4d4ac22ddc7dd2a1dc54c57874c40648b60ff97009763554eaf13
        x-checker-data:
          type: html
          url: https://kerberos.org/dist/
          version-pattern: Kerberos V5 Release ([\d\.-]*) - current release
          url-template: https://kerberos.org/dist/krb5/$version0.$version1/krb5-$version.tar.gz

  - name: XnConvert
    buildsystem: simple
    build-commands:
      - cp -a XnConvert ${FLATPAK_DEST}/
      - ln -s ${FLATPAK_DEST}/XnConvert/xnconvert.sh ${FLATPAK_DEST}/bin/xnconvert
    post-install:
      - install -Dm0644 ${FLATPAK_ID}.desktop -t ${FLATPAK_DEST}/share/applications/
      - install -Dm0644 ${FLATPAK_ID}.appdata.xml -t ${FLATPAK_DEST}/share/metainfo/
      - install -Dm0644 ${FLATPAK_ID}.svg -t ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/
    sources:
      - type: archive
        url: https://download.xnview.com/XnConvert-linux-x64.tgz
        sha256: 8400da39c015082f8f8cbbfe9041783c5f2ffd962a0583ee49289f9df4be0ac1
        strip-components: 0
        x-checker-data:
          type: rotating-url
          url: https://download.xnview.com/XnConvert-linux-x64.tgz
      - type: file
        path: com.xnview.XnConvert.desktop
      - type: file
        path: com.xnview.XnConvert.svg
      - type: file
        path: com.xnview.XnConvert.appdata.xml
